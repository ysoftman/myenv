"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
version = 4
final_space = true

[upgrade]
source = 'cdn'
interval = '168h'
auto = false
notice = false

[[blocks]]
type = 'prompt'
alignment = 'left'

# https://github.com/ysoftman/test_code/tree/master/rust/emoji/src
# cargo run main.rs ыбЬ эШДьЮм ьВмьЪйьдСьЭ╕ эП░эК╕ ыжмьКдэК╕ ы│╝ ьИШ ьЮИыПДыбЭ эЦИьЭМ.
# E0B0 ~ E0B3 : 4
# юВ░ юВ▒ юВ▓ юВ│
# E0B4 ~ E0C8 : 21
# юВ┤ юВ╡ юВ╢ юВ╖ юВ╕ юВ╣ юВ║ юВ╗ юВ╝ юВ╜ юВ╛ юВ┐ юГА юГБ юГВ юГГ юГД юГЕ юГД юГЗ юГИ
# E0CA ~ E0CA : 1
# юГК
# E0CC ~ E0D7 : 12
# юГМ юГН юГО юГП юГР юГС юГТ юГУ юГФ юГХ юГЦ юГЧ
# ыШРыКФ ьХДьЭ┤ь╜Ш ь░╕ьб░: https://www.nerdfonts.com/cheat-sheet > nf-ple- ъ▓АьГЙ > icon ы│╡ьВм

# https://ohmyposh.dev/docs/configuration/segment
[[blocks.segments]]
type = 'os'
style = 'diamond'
leading_diamond = 'юВ╢'
# template = '{{ .Icon }} {{ .HostName }}'
template = '{{ .Icon }} <b>{{ .UserName }}</b>'
foreground = '#00c983'
background = '#003543'

[[blocks.segments]]
type = 'kubectl'
style = 'powerline'
powerline_symbol = 'юГА'
template = ' юаЭ {{.Context}}{{if .Namespace}}:{{.Namespace}}{{end}}'
foreground = '#FFD166'
background = "#433500"

[blocks.segments.properties]
[blocks.segments.properties.context_aliases]
'arn:aws:eks:eu-west-1:1234567890:cluster/posh' = 'posh'

[[blocks.segments]]
type = 'path'
style = 'powerline'
powerline_symbol = 'юГД'
template = ' <#74B9FF>яДХ </>{{ .Path }}'
foreground = '#74B9FF'
background = "#002B54"

[blocks.segments.properties]
folder_icon = 'яДХ'
folder_separator_icon = '/'
home_icon = '~'
style = 'full'

[[blocks.segments]]
type = 'git'
style = 'powerline'
powerline_symbol = 'юГД'
# template = ' ({{ .UpstreamIcon }}{{ .HEAD }}{{ if gt .StashCount 0 }} юнЛ {{ .StashCount }}{{ end }}) '
template = " {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} яБД {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }} яБЖ {{ .Staging.String }}{{ end }}{{ if gt .StashCount 0 }} яГЗ {{ .StashCount }}{{ end }}"
background_templates = [
  "{{ if or (.Working.Changed) (.Staging.Changed) }}#4A4A0D{{ end }}",
  "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#4A4A0D{{ end }}",
  "{{ if gt .Ahead 0 }}#2A1054{{ end }}",
  "{{ if gt .Behind 0 }}#2A1054{{ end }}",
]
foreground_templates = [
  "{{ if or (.Working.Changed) (.Staging.Changed) }}#FFF192{{ end }}",
  "{{ if and (gt .Ahead 0) (gt .Behind 0) }}#FFF192{{ end }}",
  "{{ if gt .Ahead 0 }}#C77DFF{{ end }}",
  "{{ if gt .Behind 0 }}#C77DFF{{ end }}",
]
foreground = '#FF7F5F'
background = "#542A1A"

[blocks.segments.properties]
branch_icon = ' яРШ '
fetch_status = true
fetch_upstream_icon = true
fetch_stash_count = true
[blocks.segments.properties.mapped_branches]
"feat/*" = "ЁЯЪА "
"bug/*" = "ЁЯРЫ "

[[blocks.segments]]
type = 'python'
style = 'powerline'
powerline_symbol = 'юГД'
template = ' ґ░Ма {{ .Full }}'
foreground = '#C77DFF'
background = '#35004E'

[blocks.segments.properties]
display_mode = "files"

[[blocks.segments]]
type = 'node'
style = 'powerline'
powerline_symbol = 'юГД'
template = ' <#55EF72>ґ░ОЩ</> {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}'
foreground = '#55EF72'
background = "#0D4E1A"

[[blocks.segments]]
type = "react"
style = "powerline"
powerline_symbol = "юГД"
template = " юЮ║ {{ .Full }}"
foreground = '#FF6B9D'
background = "#54002B"

[[blocks.segments]]
type = "bun"
style = 'powerline'
powerline_symbol = 'юГД'
template = " <#00E8A2>юЭп</> {{ .Full }}"
foreground = '#00E8A2'
background = "#004A3A"

[[blocks.segments]]
style = 'powerline'
type = 'go'
powerline_symbol = 'юГД'
template = ' юШз {{ .Full }}'
foreground = '#9B7FFF'
background = '#1A0054'

[[blocks.segments]]
style = 'powerline'
type = 'rust'
powerline_symbol = 'юГД'
template = ' юЮи {{ .Full }}'
foreground = '#FFAA44'
background = '#543500'

[[blocks.segments]]
style = "powerline"
type = "helm"
powerline_symbol = 'юГД'
template = ' юЯ╗ {{ .Version }}'
background = "#0D1A54"
foreground = "#6B8CFF"

[blocks.segments.properties]
display_mode = "files"

[[blocks.segments]]
type = 'time'
style = 'powerline'
powerline_symbol = 'юГД'
template = ' яАЧ {{ .CurrentDate | date .Format }}'
foreground = '#FF5C6F'
background = "#540012"

[blocks.segments.properties]
# time_format = '3:04 PM'
time_format = "15:04:05"

[[blocks.segments]]
type = 'executiontime'
style = 'powerline'
powerline_symbol = 'юГД'
template = ' <#7BEF44>ґ░ФЯ</> {{ .FormattedMs }}'
foreground = '#7BEF44'
background = "#1A5400"

[blocks.segments.properties]
always_enabled = true

[[blocks.segments]]
type = 'status'
style = 'diamond'
powerline_symbol = 'юГД'
trailing_diamond = 'юВ┤'
template = ' {{ if gt .Code 0 }}яРб{{ else }}яСй{{ end }} '
background_templates = ['{{ if gt .Code 0 }}#540012{{ end }}']
foreground = '#FF6BD6'
background = "#540043"

[blocks.segments.properties]
always_enabled = true

[[blocks]]
type = 'prompt'
alignment = 'left'
newline = true

# root user ьЭ╝ыХМ
[[blocks.segments]]
type = 'root'
style = 'plain'
template = 'юО┐ '
foreground = '#cd5e42'

[[blocks.segments]]
type = 'text'
style = 'plain'
template = ' <#45F1C2><b>тЪб</b></><#26C6DA>тЭп</>'
foreground = '#CD4277'
