# === General options ===
set -g display-panes-time 5000 # 5초 동안 pane 숫자 보이기
set -g display-time 2000       # display-message 표시 시간 2초 (기본 750ms 는 너무 짧음)
set -g status-interval 1       # 상태바 갱신 주기 1초 (모드 인디케이터/CPU 등이 즉각 반영)
set -g base-index 1            # window(tab) 번호를 1부터 시작
setw -g pane-base-index 1      # pane 번호도 1부터 시작 (window 번호와 일관성)
set -g renumber-windows on     # window 삭제 후 번호를 1부터 다시 정렬
set -sg escape-time 10         # ESC 지연 (기본 500ms → 10ms) — vim 모드 전환 즉시 반응
set -g focus-events on         # 터미널 포커스 이벤트 앱에 전달 (vim autoread, nvim FocusGained)
set -g history-limit 50000     # 스크롤백 버퍼 (기본 2000 → 50000)
set -g allow-passthrough on    # kitty/iTerm graphics, OSC 52 등 escape 시퀀스 통과 (tmux 3.3+)

# === Terminal / extended keys ===
# 256색 + truecolor (24-bit RGB) — catppuccin 색상을 정확히 표시
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'

# 확장 키 시퀀스(CSI u) 활성화 — Shift+Enter, Ctrl+. 같은 키를 인식하기 위함
# WezTerm 이 \x1b[13;2u 같은 CSI u 시퀀스로 보내므로 tmux 도 이를 이해해야 함
set -s extended-keys on
set -as terminal-features 'wezterm*:extkeys'
set -as terminal-features 'xterm*:extkeys'

# Shift+Enter 를 ESC+Enter(\x1b\r alt+enter 시퀀스) 로 변환해 claude-code/opencode 멀티라인 입력 지원
bind -n S-Enter send-keys Escape Enter

# === Input ===
set -g mouse on              # 마우스 사용 활성화 (tmux 1.9+)
setw -g mode-keys vi         # vi 단축키 사용 (디폴트는 emacs)

# --- copy-mode 영역 선택 키 (vim 스타일) ---
# tmux vi 모드의 디폴트는 Space 로 선택 시작이지만, vim 의 v/V/C-v 가 손에 익으므로 재매핑.
#   v       : 문자 단위 선택 시작
#   V       : 줄 단위 선택 시작
#   C-v     : 블록(사각형) 선택 토글
# 선택 후 y 로 복사(tmux-yank), 또는 Escape 로 취소.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle

# === Window / Pane 생성 ===
# 창 나누기시 현재 경로로 새 창 생성
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# 9분할 tiled 데모: 여러 pane 생성 후 tiled 레이아웃 사용
# 현재 창을 계속 split-window 하면 공간이 없다는 에러 발생하므로
# select-pane 으로 활성 창을 옮겨가며 분할해야 한다.
unbind S
bind S \
split-window -v\; \
split-window -v\; \
split-window -v\; \
split-window -v\; \
select-pane -t 1\; \
split-window -h\; \
split-window -h\; \
split-window -h\; \
split-window -h\; \
select-layout tiled\;

# 위 9분할 창에서 각 pane 에 데모 명령 실행 (쉘 프롬프트가 뜨고난 뒤 사용)
unbind s
bind s \
select-pane -t 1\; send-keys 'echo ysoftman1' Enter\; send-keys 'cmatrix' enter\; \
select-pane -t 2\; send-keys 'echo ysoftman2; fd . /usr | xargs hexdump -C' enter\; \
select-pane -t 3\; send-keys 'echo ysoftman3; rg -i if /usr' enter\; \
select-pane -t 4\; send-keys 'echo ysoftman4; \sl -a; wtfutil' enter\; \
select-pane -t 5\; send-keys 'echo ysoftman5; cacafire' enter\; \
select-pane -t 6\; send-keys 'echo ysoftman6; htop' enter\; \
select-pane -t 7\; send-keys 'echo ysoftman7; infinite_cowsay' enter\; \
select-pane -t 8\; send-keys 'echo ysoftman8; asciiquarium' enter\; \
select-pane -t 9\; send-keys 'echo ysoftman9; for ((;;)); do imgcat ${myenv_path}/xelloss.jpg; sleep 1; done' enter\;


# === zellij 스타일 root 바인딩 (prefix 없이 Alt 키로 바로) ===
# -n 옵션은 prefix 없이 동작하는 root 키 테이블 바인딩이다 (bind -T root 와 동일).
#
# -T <table> 옵션: 특정 키 테이블에 바인딩을 등록한다.
#   -T root        prefix 없이 바로 동작하는 기본 테이블 (bind -n 과 동일)
#   -T prefix      prefix(C-b) 를 누른 직후 동작 (옵션 생략 시 기본값)
#   -T <사용자명>  사용자 정의 모드(서브 키맵). 진입은 'switch-client -T <사용자명>',
#                  빠져나오기는 'switch-client -T root' 또는 정의된 종료 키(Escape 등).
#                  zellij 의 모드(Pane/Tab/Resize)와 같은 prefix-mode 스타일에 사용.
# 예: bind -n C-p switch-client -T pane_mode      # C-p 누르면 pane_mode 진입
#     bind -T pane_mode h select-pane -L         # 그 상태에서 h 누르면 좌측 pane 선택

# --- pane focus 이동 (Alt + hjkl / Up/Down) ---
# h/l(좌우)는 현재 pane 이 끝에 닿으면 이전/다음 window(탭)로 넘어감 (zellij 스타일)
# 좌우는 hjkl 의 h/l 만 사용 — Alt+Left/Right 는 WezTerm 이 단어 이동용으로 가로채므로
# tmux 에서는 의도적으로 바인딩하지 않는다.
bind -n M-h if -F '#{pane_at_left}'  'previous-window' 'select-pane -L'
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l if -F '#{pane_at_right}' 'next-window'     'select-pane -R'
bind -n M-Down  select-pane -D
bind -n M-Up    select-pane -U

# --- pane 분할 / 닫기 / 확대 (zellij Pane mode 의 n/d/x/f 와 동일 키) ---
bind -n M-n split-window -h -c "#{pane_current_path}"   # 오른쪽으로 새 pane
bind -n M-d split-window -v -c "#{pane_current_path}"   # 아래로 새 pane
bind -n M-x kill-pane                                   # 현재 pane 닫기
# M-f / M-b 는 WezTerm 이 Alt+Right/Left 를 변환해 전송하는 키이므로
# tmux 가 가로채지 않도록 명시적으로 해제 (shell 의 단어 이동을 그대로 통과시킨다).
unbind -n M-f
unbind -n M-b

# --- pane 크기 조절 (Alt + Shift + hjkl) ---
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 3
bind -n M-K resize-pane -U 3
bind -n M-L resize-pane -R 5

# --- layout 전환 (5개 프리셋 + tiled/even 단축) ---
bind -n M-. next-layout                                  # 다음 레이아웃으로 순환
bind -n M-, previous-layout                              # 이전 레이아웃
bind -n M-= select-layout tiled                          # tiled 균등 그리드
bind -n M-\\ select-layout even-horizontal               # 가로 균등
bind -n M-- select-layout even-vertical                  # 세로 균등
# M-[ : 현재 window 의 pane 들을 수직(상하) 균등 배치
# M-] : 현재 window 의 pane 들을 수평(좌우) 균등 배치
bind -n M-[ select-layout even-vertical
bind -n M-] select-layout even-horizontal

# --- window(탭) 점프 (1..9번 탭) ---
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9


# === Sub modes (zellij 호환 prefix mode 스타일) ===
# 공통 진입/탈출 패턴:
#   bind -n C-X switch-client -T <mode> \; refresh-client -S  # 진입 + status bar 즉시 갱신
#   bind -T <mode> C-X switch-client -T root                  # 토글로 빠져나가기
#   bind -T <mode> Escape switch-client -T root               # Escape 로 빠져나가기

# --- Ctrl-P pane 모드 (zellij Pane mode 호환) ---
# 주의: Ctrl-P 가 root 키로 잡혀 셸 history-up, vim/fzf 의 Ctrl-P 가 동작하지 않습니다.
# refresh-client -S 로 status bar 를 즉시 갱신해 모드 인디케이터가 바로 표시되게 함
bind -n C-p switch-client -T pane_mode \; refresh-client -S
bind -T pane_mode C-p switch-client -T root

# focus 이동 (zellij: h/j/k/l + 방향키)
bind -T pane_mode h select-pane -L
bind -T pane_mode j select-pane -D
bind -T pane_mode k select-pane -U
bind -T pane_mode l select-pane -R
bind -T pane_mode Left  select-pane -L
bind -T pane_mode Down  select-pane -D
bind -T pane_mode Up    select-pane -U
bind -T pane_mode Right select-pane -R

# 다음 pane 으로 focus 순환 (zellij: p)
bind -T pane_mode p select-pane -t :.+

# pane 생성 (zellij: n 디폴트 방향, d 아래, r 오른쪽)
bind -T pane_mode n split-window -h -c "#{pane_current_path}"   # 디폴트(tmux 는 오른쪽으로 매핑)
bind -T pane_mode d split-window -v -c "#{pane_current_path}"   # 아래
bind -T pane_mode r split-window -h -c "#{pane_current_path}"   # 오른쪽

# 기타 pane 동작 (zellij: x/f/z/c)
bind -T pane_mode x kill-pane                                                                                          # 닫기
bind -T pane_mode f resize-pane -Z                                                                                     # fullscreen(zoom) 토글
bind -T pane_mode z if -F '#{==:#{pane-border-status},off}' 'set pane-border-status top' 'set pane-border-status off'  # frame 토글
bind -T pane_mode c command-prompt -p "Pane name:" "select-pane -T '%%'"                                               # pane 이름 변경

# layout 동작 (tmux 편의 — zellij Pane mode 에는 없는 추가 기능)
bind -T pane_mode t select-layout tiled
bind -T pane_mode \\ select-layout even-horizontal
bind -T pane_mode - select-layout even-vertical
bind -T pane_mode Space next-layout

# 모드 취소
bind -T pane_mode Escape switch-client -T root

# --- Ctrl-T tab 모드 (zellij Tab mode 호환) ---
# 주의: Ctrl-T 가 root 키로 잡혀 셸 transpose-chars, fzf 의 Ctrl-T(파일 찾기) 가 동작하지 않습니다.
#       부담스러우면 'C-t' 를 다른 키로 바꿔 쓰세요.
bind -n C-t switch-client -T tab_mode \; refresh-client -S
bind -T tab_mode C-t switch-client -T root

# tab 생성 (zellij: n)
bind -T tab_mode n new-window -c "#{pane_current_path}"

# tab 이동 (zellij: h/l + 방향키)
bind -T tab_mode h previous-window
bind -T tab_mode l next-window
bind -T tab_mode Left  previous-window
bind -T tab_mode Right next-window

# tab 점프 (1..9번 탭)
bind -T tab_mode 1 select-window -t 1
bind -T tab_mode 2 select-window -t 2
bind -T tab_mode 3 select-window -t 3
bind -T tab_mode 4 select-window -t 4
bind -T tab_mode 5 select-window -t 5
bind -T tab_mode 6 select-window -t 6
bind -T tab_mode 7 select-window -t 7
bind -T tab_mode 8 select-window -t 8
bind -T tab_mode 9 select-window -t 9

# 기타 tab 동작 (zellij: x 닫기, r 이름변경, s sync 토글)
bind -T tab_mode x kill-window
bind -T tab_mode r command-prompt -p "Tab name:" "rename-window '%%'"
# s: synchronize-panes 토글 (zellij Tab mode 의 s 와 동일). 토글 후 모드 유지
bind -T tab_mode s setw synchronize-panes \; display "sync-panes: #{?synchronize-panes,ON,OFF}" \; switch-client -T tab_mode

# 모드 취소
bind -T tab_mode Escape switch-client -T root

# --- Ctrl-H resize 모드 (zellij Resize mode 호환) ---
# 주의: Ctrl-H 는 터미널에서 Backspace 와 동일하게 처리되어 셸/vim 의 Backspace 가
#       모드 진입으로 잡힐 수 있습니다. 부담스러우면 다른 키로 바꿔 쓰세요.
bind -n C-h switch-client -T resize_mode \; refresh-client -S
bind -T resize_mode C-h switch-client -T root

# pane 크기 조정 (h/j/k/l, 방향키). 명령 끝에 switch-client -T resize_mode 를
# 다시 두어 모드를 유지하므로 hhh, ljjj 같이 연속 입력 가능
bind -T resize_mode h resize-pane -L 5 \; switch-client -T resize_mode
bind -T resize_mode j resize-pane -D 3 \; switch-client -T resize_mode
bind -T resize_mode k resize-pane -U 3 \; switch-client -T resize_mode
bind -T resize_mode l resize-pane -R 5 \; switch-client -T resize_mode
bind -T resize_mode Left  resize-pane -L 5 \; switch-client -T resize_mode
bind -T resize_mode Down  resize-pane -D 3 \; switch-client -T resize_mode
bind -T resize_mode Up    resize-pane -U 3 \; switch-client -T resize_mode
bind -T resize_mode Right resize-pane -R 5 \; switch-client -T resize_mode

# 큰 스텝 (Shift+hjkl): 좌우 10, 상하 5
bind -T resize_mode H resize-pane -L 10 \; switch-client -T resize_mode
bind -T resize_mode J resize-pane -D 5  \; switch-client -T resize_mode
bind -T resize_mode K resize-pane -U 5  \; switch-client -T resize_mode
bind -T resize_mode L resize-pane -R 10 \; switch-client -T resize_mode

# zoom 토글 (zellij Resize mode 의 f)
bind -T resize_mode f resize-pane -Z \; switch-client -T resize_mode

# 모드 취소
bind -T resize_mode Escape switch-client -T root
bind -T resize_mode q      switch-client -T root


# === Reload / 외부 설정 ===
# 별도 설정 파일이 존재하면 읽기
if-shell "test -f ~/workspace/bill-ysoftman/tmux.conf" "source ~/workspace/bill-ysoftman/tmux.conf"

# tmux 다시 읽기 (prefix + r, 또는 M-r 로 prefix 없이 빠르게)
# \; 체이닝이 불안정한 경우 있어 run-shell 로 묶음
bind r run-shell "tmux source-file ~/.tmux.conf && tmux display-message 'ysoftman ~/.tmux.conf loaded'"
bind -n M-r run-shell "tmux source-file ~/.tmux.conf && tmux display-message 'ysoftman ~/.tmux.conf loaded'"


# === Plugins ===
# tmux 실행 후 최초 한번은 install 실행해야 한다.
#   ctrl+b, I        : install
#   ctrl+b, U        : update
#   ctrl+b, alt, u   : remove
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# dracula theme 사용하려면 ~/.tmux/plugins/tmux 디렉토리 삭제후 catppuccin 주석 처리해서 설치해야 함
#set -g @plugin 'dracula/tmux'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'vascomfnunes/tmux-clima'
set -g @plugin 'jamesoff/tmux-loadavg'
# copy-mode 에서 시스템 클립보드로 yank (macOS: pbcopy, Linux: xclip/xsel/wl-copy 자동 감지)
#
# [복사 흐름]
#   prefix + [      : copy-mode 진입 (또는 마우스 휠 스크롤)
#   hjkl / 방향키   : 커서 이동, w/b 단어 점프, g/G 처음/끝, / 검색
#   v               : 문자 단위 선택 시작 (vim 스타일)
#   V               : 줄 단위 선택 시작
#   C-v             : 블록(사각형) 선택 토글
#   y               : 선택 영역 복사 (시스템 클립보드 + tmux 버퍼)  ← tmux-yank
#   Y               : 현재 줄 복사                                  ← tmux-yank
#   q / Escape      : copy-mode 종료
#   (마우스 드래그) : 드래그 끝나면 자동 복사 + copy-mode 종료
#
# [prefix 모드에서 복사]
#   prefix + y      : 셸 커맨드라인 텍스트 복사                     ← tmux-yank
#   prefix + Y      : 현재 pane 의 작업 디렉토리(pwd) 복사          ← tmux-yank
#
# [붙여넣기]
#   prefix + ]      : 가장 최근 tmux 버퍼 붙여넣기 (어느 pane 이든)
#   prefix + =      : 버퍼 목록에서 골라 붙여넣기 (choose-buffer)
#   Cmd + V (mac)   : 시스템 클립보드 붙여넣기 — tmux-yank 가 pbcopy 로 넣어두므로
#                     터미널/브라우저/다른 앱 어디서든 그대로 paste 가능
#   * 원격 SSH 세션이라도 set-clipboard on + OSC 52 지원 터미널이면 로컬 클립보드로 전달됨
set -g @plugin 'tmux-plugins/tmux-yank'
# fzf 기반 인터랙티브 메뉴 (세션/윈도우/pane/명령/키바인딩/클립보드 검색)
#   prefix + F      : 메뉴 열기
# 필요: fzf 가 PATH 에 있어야 함 (brew install fzf)
set -g @plugin 'sainnhe/tmux-fzf'

# --- Catppuccin theme (활성) ---
set -g @catppuccin_flavour 'mocha' # latte,frappe, macchiato or mocha
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator "█ "
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#{b:pane_current_path}:#{pane_current_command}"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#{b:pane_current_path}:#{pane_current_command}"
# 시스템 정보(cpu/battery/load) 를 catppuccin status-right 에 활성화
# 각 모듈은 ~/.tmux/plugins/tmux/status/{cpu,battery,load}.sh 가 tmux-cpu / tmux-battery /
# tmux-loadavg 플러그인의 변수를 사용해 렌더링한다.
# 순서: cpu → load → session → user → battery (맨 끝)
set -g @catppuccin_status_modules_right "cpu load session user battery"
# status-right-length 는 catppuccin 이 TPM 실행 시 자체 값으로 덮어쓰므로
# 여기가 아니라 아래 "Post-TPM overrides" 섹션에서 최종 설정한다.
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "all"
set -g @catppuccin_status_connect_separator "no"
# status-right 항목별 색상
set -g @catppuccin_cpu_color "#f38ba8"
set -g @catppuccin_load_color "#313a5a"
set -g @catppuccin_load_icon "#[fg=#89b4fa,bg=#313a5a]󰊚"
set -g @catppuccin_load_text "#[fg=#cdd6f4,bg=#313a5a]#{load_full}"
set -g @catppuccin_session_color "#a6e3a1"
set -g @catppuccin_user_color "#89dceb"
set -g @catppuccin_battery_color "#f9e2af"

# --- Dracula theme (비활성 — @plugin 주석 처리됨. 전환 시 참조용 설정 유지) ---
# available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, ssh-session, attached-clients, network-vpn, weather, time, mpc, spotify-tui, playerctl, kubernetes-context, synchronize-panes
# 사용할 플러그인 순서대로 상태바에 보인다.
set -g @dracula-plugins "cpu-usage gpu-usage ram-usage time network battery"
# 날씨 요청 제한 수 넘기는 문제 + sleep_weather 백그라운드 프로세스가 계속 생기는 문제등이 있어 사용하지 않음
set -g @dracula-show-weather false
set -g @dracula-show-fahrenheit false  # fahrenheit(화씨)
set -g @dracula-show-powerline true
set -g @dracula-show-battery true
set -g @dracula-show-timezone true
set -g @dracula-refresh-rate 5
set -g @dracula-day-month true
set -g @dracula-military-time true
set -g @dracula-show-left-icon smiley # session, smiley, window, or any character.
set -g @dracula-border-contrast true


# === TPM 초기화 (이 라인은 plugin/theme 설정 다음, override 이전에 반드시 위치) ===
run '~/.tmux/plugins/tpm/tpm'


# === Post-TPM overrides (tpm 가 status-left 등을 덮어쓰므로 반드시 이후에 set) ===

# --- 모드 인디케이터 (status-left 에 NORMAL/PREFIX/PANE/TAB/RESIZE 표시) ---
# catppuccin 이 @catppuccin_status_modules_left 가 비어있으면 status-left 를 빈 문자열로
# set 하므로 tpm 실행 뒤에 직접 set 해야 한다. 자기참조(#{status-left}) 는 절대 쓰지 않음.
#   NORMAL  - 평소 (초록  #a6e3a1)
#   PREFIX  - C-b 누른 직후 (빨강  #f38ba8)
#   PANE    - C-p 진입 (주황  #fab387)
#   TAB     - C-t 진입 (청록  #89dceb)
#   RESIZE  - C-h 진입 (노랑  #f9e2af)
#   COPY    - copy-mode 진입 (보라  #cba6f7) — prefix + [ 또는 마우스 휠 스크롤
# 조건 우선순위 주의:
# 1) switch-client -T <table> 가 client_prefix 도 함께 set 하므로 client_prefix 먼저 체크하면
#    pane_mode/tab_mode/resize_mode 가 모두 PREFIX 로 잡힌다. key_table 을 먼저 체크해야 함.
# 2) COPY 는 client_key_table 대신 pane_in_mode 를 쓴다. 일부 tmux 버전에서 copy-mode 진입
#    시 client_key_table 이 즉시 갱신되지 않거나 'copy-mode-vi' 와 다른 값으로 잡히는 경우가
#    있어, 활성 pane 의 모드 진입 플래그를 직접 확인하는 게 안전.
set -g status-left-length 30
set -g status-left "#[bold,fg=#1e1e2e,bg=#{?pane_in_mode,#cba6f7,#{?#{==:#{client_key_table},pane_mode},#fab387,#{?#{==:#{client_key_table},tab_mode},#89dceb,#{?#{==:#{client_key_table},resize_mode},#f9e2af,#{?client_prefix,#f38ba8,#a6e3a1}}}}}] #{?pane_in_mode,COPY,#{?#{==:#{client_key_table},pane_mode},PANE,#{?#{==:#{client_key_table},tab_mode},TAB,#{?#{==:#{client_key_table},resize_mode},RESIZE,#{?client_prefix,PREFIX,NORMAL}}}}} #[default] "

# --- status-right 폭 확장 ---
# catppuccin 이 TPM 실행 시 status-right-length 를 자체 값으로 set 하므로 반드시 TPM 뒤에서
# 다시 덮어써야 적용된다. 모듈 수(cpu/load/session/user/battery)를 감안해 넉넉히 500 으로
# 설정 — 좌측 여백이 있는 한 잘리지 않는다.
set -g status-right-length 500

# --- 활성 pane 경계선 강조 ---
# bg 색상을 주면 경계선이 두꺼워지고 터미널 opacity 효과가 가려져 bg=default 유지.
# prefix(C-b) 누른 상태에서는 노란색으로 강조, 평소엔 colour203.
set -g pane-active-border-style "#{?client_prefix,fg=yellow,fg=#a6e3a1},bg=default"

# --- pane 상단 라벨 띠 (활성 pane 을 사각형으로 감싸는 듯한 효과) ---
# tmux 의 pane border 는 pane 사이 공유 edge 에만 그려지므로 window 가장자리의 바깥변은
# 그릴 수 없다. 대신 pane-border-status 로 각 pane 위쪽에 한 줄을 추가하면 활성 pane 의
# 윗변까지 색이 채워져 "감싸진" 시각효과를 낼 수 있다.
set -g pane-border-status top
# 활성 pane: 반전(reverse) + pane 번호/제목, 비활성 pane: 옅은 색
set -g pane-border-format "#{?pane_active,#[reverse] #P  #{pane_current_command}  #{b:pane_current_path} #[noreverse],  #P  #{pane_current_command}  #{b:pane_current_path}  }"


# === 트러블슈팅 ===
# tmux 테마/설정이 초기화 되지 않는 경우 tmux 프로세스를 종료하고 재시작:
#   tmux kill-server
#   또는 kill -9 <tmux_pid>
