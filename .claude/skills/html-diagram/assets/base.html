<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --bg: #0f1116;
        --panel: #161a22;
        --panel-2: #1d2230;
        --border: #2a3142;
        --fg: #e6e8ee;
        --muted: #98a2b3;
        --accent: #6ea8fe;
        --accent-2: #4ade80;
        --warn: #f59e0b;
        --err: #ef4444;
        --ok: #22c55e;
        --skip: #64748b;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0; padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", Roboto, sans-serif;
        line-height: 1.55;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .wrap { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
      nav.toc {
        position: sticky; top: 0; height: 100vh;
        overflow-y: auto; padding: 24px 16px;
        border-right: 1px solid var(--border);
        background: var(--panel); font-size: 15px;
      }
      nav.toc h1 { font-size: 16px; margin: 0 0 8px; color: var(--accent); }
      nav.toc .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
      nav.toc ol { list-style: none; padding: 0; margin: 0; counter-reset: tocsec; }
      nav.toc ol li { counter-increment: tocsec; margin: 4px 0; }
      nav.toc ol li a::before { content: counter(tocsec) ". "; color: var(--muted); }
      main { padding: 32px 40px 80px; max-width: 1200px; }

      header.doc { margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
      header.doc h1 { margin: 0 0 6px; font-size: 26px; }
      header.doc .meta { color: var(--muted); font-size: 15px; }

      section.diagram {
        margin-bottom: 56px; padding: 24px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      section.diagram h2 { margin: 0 0 4px; font-size: 20px; }
      section.diagram .src { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
      section.diagram p.desc { color: var(--fg); font-size: 16px; margin: 0 0 18px; }

      .svgwrap {
        background: var(--panel-2);
        border: 1px solid var(--border);
        border-radius: 6px; padding: 16px;
        overflow-x: auto;
      }
      .svgwrap svg { display: block; max-width: 100%; height: auto; }

      code, pre { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 14.5px; }
      code { background: var(--panel-2); padding: 1px 5px; border-radius: 3px; color: var(--accent); }

      .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 13px; font-weight: 600; }
      .badge.ok   { background: rgba(34,197,94,.15);   color: var(--ok);   border: 1px solid rgba(34,197,94,.35); }
      .badge.wip  { background: rgba(245,158,11,.15);  color: var(--warn); border: 1px solid rgba(245,158,11,.35); }
      .badge.todo { background: rgba(100,116,139,.15); color: var(--skip); border: 1px solid rgba(100,116,139,.35); }
      .badge.skip { background: rgba(100,116,139,.15); color: var(--skip); border: 1px solid rgba(100,116,139,.35); text-decoration: line-through; }
      .badge.err  { background: rgba(239,68,68,.15);   color: var(--err);  border: 1px solid rgba(239,68,68,.35); }

      .callout {
        margin-top: 14px; padding: 12px 14px;
        border-left: 3px solid var(--warn);
        background: rgba(245,158,11,.08);
        font-size: 15px; border-radius: 4px;
      }
      .callout.err { border-left-color: var(--err); background: rgba(239,68,68,.08); }
      .callout.ok  { border-left-color: var(--ok);  background: rgba(34,197,94,.08); }
      .callout strong { color: var(--warn); }
      .callout.err strong { color: var(--err); }
      .callout.ok strong  { color: var(--ok); }

      .legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 12px; font-size: 14px; color: var(--muted); }
      .legend .item { display: inline-flex; align-items: center; gap: 6px; }
      .legend .sw { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }

      table.mapping { width: 100%; border-collapse: collapse; font-size: 15px; margin-top: 8px; }
      table.mapping th, table.mapping td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
      table.mapping th { color: var(--muted); font-weight: 600; background: var(--panel-2); }
      table.mapping td.area { color: var(--muted); }

      @media (max-width: 880px) {
        .wrap { grid-template-columns: 1fr; }
        nav.toc { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
        main { padding: 24px 18px 60px; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <nav class="toc">
        <h1>{{NAV_TITLE}}</h1>
        <div class="sub">{{NAV_SUBTITLE}}</div>
        <ol>
          <!-- <li><a href="#sec1">섹션 제목</a></li> -->
        </ol>
      </nav>

      <main>
        <header class="doc">
          <h1>{{DOC_TITLE}}</h1>
          <div class="meta">{{DOC_META}}</div>
        </header>

        <!-- ============== section.diagram blocks go here ============== -->
        <!--

          <div class="svgwrap">
            <svg viewBox="0 0 1100 200" xmlns="http://www.w3.org/2000/svg"
                 role="img" aria-label="…">
              …
            </svg>
          </div>
        </section>
        -->
      </main>
    </div>
  </body>
</html>
